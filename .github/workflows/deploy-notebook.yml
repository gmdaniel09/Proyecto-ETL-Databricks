name: Deploy Supermarket Superstore Dataset-Bundle ETL Databricks

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    # ─── 1. CHECKOUT ─────────────────────────────────────────────────────────────
    - name: Checkout Repository
      uses: actions/checkout@v5

    - name: Install jq & curl
      run: sudo apt-get update && sudo apt-get install -y jq curl

    # ─── 2. DESPLIEGUE DE NOTEBOOKS ──────────────────────────────────────────────
    # Los notebooks se leen directamente del repo (CI/CD real).
    # Se importan como JUPYTER (.ipynb) con base64 encoding, sobreescribiendo lo
    # que hay en el workspace destino.
    - name: Deploy notebooks to Destination Workspace
      run: |
        DEST_HOST=${{ secrets.DATABRICKS_DEST_HOST }}
        DEST_TOKEN=${{ secrets.DATABRICKS_DEST_TOKEN }}
        DEST_BASE="/py/scripts/main/proceso"

        NOTEBOOKS=(
          "proceso/1. Preparacion_Ambiente.ipynb"
          "proceso/2. DDLs Tablas.ipynb"
          "proceso/3. Ingesta bronze.ipynb"
          "proceso/4. Transformacion.ipynb"
          "proceso/5. Load.ipynb"
          "proceso/6. Grants.ipynb"
        )

        echo "Creando carpeta destino $DEST_BASE..."
        curl -s -X POST \
          -H "Authorization: Bearer $DEST_TOKEN" \
          -H "Content-Type: application/json" \
          -d "{\"path\":\"$DEST_BASE\"}" \
          "$DEST_HOST/api/2.0/workspace/mkdirs"

        for notebook_file in "${NOTEBOOKS[@]}"; do
          name=$(basename "$notebook_file" .ipynb)
          dest_path="$DEST_BASE/$name"
          echo "Importando $name → $dest_path ..."

          encoded=$(base64 -w 0 "$notebook_file")

          response=$(curl -s -X POST \
            -H "Authorization: Bearer $DEST_TOKEN" \
            -H "Content-Type: application/json" \
            -d "{
              \"path\": \"$dest_path\",
              \"format\": \"JUPYTER\",
              \"overwrite\": true,
              \"content\": \"$encoded\"
            }" \
            "$DEST_HOST/api/2.0/workspace/import")

          error=$(echo "$response" | jq -r '.error_code // empty')
          if [ -n "$error" ]; then
            echo "❌ Error al importar $name: $response"
            exit 1
          fi
          echo "✅ $name importado exitosamente"
        done

    # ─── 3. CLUSTER ──────────────────────────────────────────────────────────────
    - name: Get existing cluster ID
      run: |
        DEST_HOST=${{ secrets.DATABRICKS_DEST_HOST }}
        DEST_TOKEN=${{ secrets.DATABRICKS_DEST_TOKEN }}
        CLUSTER_NAME="Clustergamd"

        clusters_response=$(curl -s -X GET \
          -H "Authorization: Bearer $DEST_TOKEN" \
          "$DEST_HOST/api/2.0/clusters/list")

        cluster_id=$(echo "$clusters_response" | jq -r --arg name "$CLUSTER_NAME" \
          '.clusters[]? | select(.cluster_name == $name) | .cluster_id')

        if [ -n "$cluster_id" ] && [ "$cluster_id" != "null" ]; then
          echo "✅ Cluster '$CLUSTER_NAME' → ID: $cluster_id"
          echo "CLUSTER_ID=$cluster_id" >> $GITHUB_ENV
        else
          echo "❌ No se encontró el cluster: $CLUSTER_NAME"
          echo "Clusters disponibles:"
          echo "$clusters_response" | jq -r '.clusters[]? | .cluster_name'
          exit 1
        fi

    # ─── 4. CLEANUP DEL WORKFLOW PREVIO ──────────────────────────────────────────
    - name: Delete existing workflow if present
      run: |
        DEST_HOST=${{ secrets.DATABRICKS_DEST_HOST }}
        DEST_TOKEN=${{ secrets.DATABRICKS_DEST_TOKEN }}
        WORKFLOW_NAME="WF_ADB"

        response=$(curl -s -X GET \
          -H "Authorization: Bearer $DEST_TOKEN" \
          "$DEST_HOST/api/2.1/jobs/list")

        existing_id=$(echo "$response" | jq -r --arg name "$WORKFLOW_NAME" \
          '.jobs[]? | select(.settings.name == $name) | .job_id')

        if [ -n "$existing_id" ] && [ "$existing_id" != "null" ]; then
          echo "Eliminando workflow existente (ID: $existing_id)..."
          curl -s -X POST \
            -H "Authorization: Bearer $DEST_TOKEN" \
            -H "Content-Type: application/json" \
            -d "{\"job_id\": $existing_id}" \
            "$DEST_HOST/api/2.1/jobs/delete"
          echo "✅ Workflow anterior eliminado"
        else
          echo "No existe workflow previo con nombre: $WORKFLOW_NAME"
        fi

    # ─── 5. CREACIÓN DEL WORKFLOW ─────────────────────────────────────────────────
   
    - name: Create Workflow WF_ADB
      run: |
        DEST_HOST=${{ secrets.DATABRICKS_DEST_HOST }}
        DEST_TOKEN=${{ secrets.DATABRICKS_DEST_TOKEN }}
        DEST_BASE="/py/scripts/main/proceso"
        CLUSTER_ID="${{ env.CLUSTER_ID }}"

        cat > workflow_config.json << EOF
        {
          "name": "WF_ADB",
          "format": "MULTI_TASK",
          "tasks": [
            {
              "task_key": "1. Preparacion_Ambiente",
              "description": "Ejecuta notebook 1. Preparacion_Ambiente con parámetros",
              "notebook_task": {
                "notebook_path": "/py/scripts/main/proceso/1. Preparacion_Ambiente",
                "source": "WORKSPACE",
                "base_parameters": {
                  "storageName": "adlsgamd26" 
                }
              },
              "existing_cluster_id": "$CLUSTER_ID",
              "timeout_seconds": 3600,
              "max_retries": 2
            },
            {
              "task_key": "2. DDLs Tablas",
              "description": "Ejecuta notebook 2. DDLs Tablas con parámetros",
              "notebook_task": {
                "notebook_path": "/py/scripts/main/proceso/2. DDLs Tablas",
                "source": "WORKSPACE",
                "base_parameters": {
                  "storageName": "adlsgamd26",
                  "catalogo": "catalog_gamd"
                }
              },
              "existing_cluster_id": "$CLUSTER_ID",
              "timeout_seconds": 3600,
              "max_retries": 2,
              "depends_on": [
                {
                  "task_key": "1. Preparacion_Ambiente"
                }
              ]
            },
            {
              "task_key": "3. Ingesta bronze",
              "description": "Ejecuta notebook 3. Ingesta bronze con parámetros",
              "notebook_task": {
                "notebook_path": "/py/scripts/main/proceso/3. Ingesta bronze",
                "source": "WORKSPACE",
                "base_parameters": {
                  "container": "raw",
                  "catalogo": "catalog_gamd",
                  "esquema": "bronze",
                  "storageName": "adlsgamd26"
                }
              },
              "existing_cluster_id": "$CLUSTER_ID",
              "timeout_seconds": 3600,
              "max_retries": 2,
              "depends_on": [
                {
                  "task_key": "2. DDLs Tablas"
                }
              ]
            },
            {
              "task_key": "4. Transformacion",
              "description": "Ejecuta notebook 4. Transformacion con parámetros",
              "notebook_task": {
                "notebook_path": "/py/scripts/main/proceso/4. Transformacion",
                "source": "WORKSPACE",
                "base_parameters": {
                  "catalogo": "catalog_gamd",
                  "esquema_source": "bronze",
                  "esquema_sink": "silver"
                }
              },
              "existing_cluster_id": "$CLUSTER_ID",
              "timeout_seconds": 3600,
              "max_retries": 2,
              "depends_on": [
                {
                  "task_key": "3. Ingesta bronze"
                }
              ]
            },
            {
              "task_key": "5. Load",
              "description": "Ejecuta notebook 5. Load con parámetros",
              "notebook_task": {
                "notebook_path": "/py/scripts/main/proceso/5. Load",
                "source": "WORKSPACE",
                "base_parameters": {
                  ""catalogo": "catalog_gamd",
                  "esquema_source": "silver",
                  "esquema_sink": "golden"
                }
              },
              "existing_cluster_id": "$CLUSTER_ID",
              "timeout_seconds": 3600,
              "max_retries": 2,
              "depends_on": [
                {
                  "task_key": "4. Transformacion"
                }
              ]
            },
            {
              "task_key": "6. Grants",
              "description": "Ejecuta notebook 6. Grants con parámetros",
              "notebook_task": {
                "notebook_path": "/py/scripts/main/proceso/6. Grants",
                "source": "WORKSPACE",
                "base_parameters": {
                  "catalogo": "catalog_gamd"
                }
              },
              "existing_cluster_id": "$CLUSTER_ID",
              "timeout_seconds": 3600,
              "max_retries": 2,
              "depends_on": [
                {
                  "task_key": "5. Load"
                }
              ]
            }
          ],
          "schedule": {
            "quartz_cron_expression": "0 0 6 * * ?",
            "timezone_id": "America/Bogota",
            "pause_status": "PAUSED"
          },
          "email_notifications": {
            "on_failure": [],
            "on_success": [],
            "no_alert_for_skipped_runs": false
          },
          "timeout_seconds": 10800,
          "max_concurrent_runs": 1,
          "tags": {
            "environment": "production",
            "created_by": "github_actions",
            "project": "Proyecto-ETL-Databricks"
          }
        }
        EOF

        create_response=$(curl -s -X POST \
          -H "Authorization: Bearer $DEST_TOKEN" \
          -H "Content-Type: application/json" \
          -d @workflow_config.json \
          "$DEST_HOST/api/2.1/jobs/create")

        echo "Workflow creation response: $create_response"
        job_id=$(echo "$create_response" | jq -r '.job_id')

        if [ -n "$job_id" ] && [ "$job_id" != "null" ]; then
          echo "✅ Workflow 'WF_ADB' creado con ID: $job_id"
          echo "WORKFLOW_JOB_ID=$job_id" >> $GITHUB_ENV
        else
          echo "❌ Error al crear el workflow"
          exit 1
        fi

    # ─── 6. VALIDACIÓN ───────────────────────────────────────────────────────────
    - name: Validate Workflow Configuration
      run: |
        DEST_HOST=${{ secrets.DATABRICKS_DEST_HOST }}
        DEST_TOKEN=${{ secrets.DATABRICKS_DEST_TOKEN }}
        JOB_ID="${{ env.WORKFLOW_JOB_ID }}"

        job_details=$(curl -s -X GET \
          -H "Authorization: Bearer $DEST_TOKEN" \
          "$DEST_HOST/api/2.1/jobs/get?job_id=$JOB_ID")

        echo "📋 Resumen del workflow:"
        echo "Nombre : $(echo "$job_details" | jq -r '.settings.name')"
        echo "N° tareas: $(echo "$job_details" | jq '.settings.tasks | length')"
        echo ""
        echo "📝 Tareas y dependencias:"
        echo "$job_details" | jq -r '.settings.tasks[] |
          "  - " + .task_key +
          " → " + .notebook_task.notebook_path +
          "  [deps: " + ((.depends_on // []) | map(.task_key) | join(", ")) + "]"'

    # ─── 7. EJECUCIÓN ────────────────────────────────────────────────────────────
    - name: Execute Workflow WF_ADB
      run: |
        DEST_HOST=${{ secrets.DATABRICKS_DEST_HOST }}
        DEST_TOKEN=${{ secrets.DATABRICKS_DEST_TOKEN }}
        JOB_ID="${{ env.WORKFLOW_JOB_ID }}"

        echo "🚀 Ejecutando workflow ID: $JOB_ID"

        run_response=$(curl -s -X POST \
          -H "Authorization: Bearer $DEST_TOKEN" \
          -H "Content-Type: application/json" \
          -d "{\"job_id\": $JOB_ID}" \
          "$DEST_HOST/api/2.1/jobs/run-now")

        run_id=$(echo "$run_response" | jq -r '.run_id')

        if [ -n "$run_id" ] && [ "$run_id" != "null" ]; then
          echo "✅ Ejecución iniciada → Run ID: $run_id"
          echo "🔗 URL: $DEST_HOST/jobs/$JOB_ID/runs/$run_id"
          echo "WORKFLOW_RUN_ID=$run_id" >> $GITHUB_ENV
        else
          echo "❌ Error al ejecutar el workflow"
          echo "Response: $run_response"
          exit 1
        fi

    # ─── 8. MONITOREO ────────────────────────────────────────────────────────────
    
    - name: Monitor Workflow Execution
      run: |
        DEST_HOST=${{ secrets.DATABRICKS_DEST_HOST }}
        DEST_TOKEN=${{ secrets.DATABRICKS_DEST_TOKEN }}
        RUN_ID="${{ env.WORKFLOW_RUN_ID }}"
        JOB_ID="${{ env.WORKFLOW_JOB_ID }}"

        max_wait=1800
        elapsed=0
        interval=30

        echo "📊 Monitoreando Run ID: $RUN_ID (timeout: ${max_wait}s)"

        while [ $elapsed -lt $max_wait ]; do
          run_status=$(curl -s -X GET \
            -H "Authorization: Bearer $DEST_TOKEN" \
            "$DEST_HOST/api/2.1/jobs/runs/get?run_id=$RUN_ID")

          state=$(echo "$run_status" | jq -r '.state.life_cycle_state')
          result=$(echo "$run_status" | jq -r '.state.result_state // "RUNNING"')

          echo "⏱️  [${elapsed}s] $state ($result)"
          echo "$run_status" | jq -r '.tasks[]? |
            "  " + .task_key + ": " +
            .state.life_cycle_state + " (" + (.state.result_state // "-") + ")"'

          case "$state" in
            "TERMINATED")
              if [ "$result" = "SUCCESS" ]; then
                echo "🎉 Pipeline ETL completado exitosamente!"
                start=$(echo "$run_status" | jq -r '.start_time')
                end=$(echo "$run_status" | jq -r '.end_time')
                if [ "$start" != "null" ] && [ "$end" != "null" ]; then
                  duration=$((($end - $start) / 1000))
                  echo "⏰ Duración total: ${duration}s"
                fi
                exit 0
              else
                echo "❌ Pipeline terminó con error: $result"
                echo "📋 Estado de las tareas:"
                echo "$run_status" | jq -r '.tasks[]? |
                  "  ❌ " + .task_key + ": " + (.state.result_state // "UNKNOWN")'
                exit 1
              fi
              ;;
            "INTERNAL_ERROR"|"SKIPPED")
              echo "❌ Pipeline falló con estado: $state"
              exit 1
              ;;
          esac

          sleep $interval
          elapsed=$((elapsed + interval))
        done

        echo "⚠️  Timeout (${max_wait}s): el pipeline sigue ejecutándose en Databricks"
        echo "🔗 $DEST_HOST/jobs/$JOB_ID/runs/$RUN_ID"
        echo "ℹ️  El workflow continuará corriendo — este step no es bloqueante"
        exit 0

    # ─── 9. LIMPIEZA ─────────────────────────────────────────────────────────────
    - name: Clean up
      if: always()
      run: rm -f workflow_config.json

    - name: Done
      run: |
        echo "🎉 Despliegue completado exitosamente!"
        echo ""
        echo "📦 Notebooks desplegados en: /py/scripts/main/proceso/"
        echo ""
        echo "🔀 Flujo del pipeline:"
        echo "   1. preparacion_ambiente"
        echo "   2. ingest_population  ↗  (en paralelo)"
        echo "      ingest_specs       ↗  (en paralelo)"
        echo "   3. transform_vehicles"
        echo "   4. load_vehicle"
        echo ""
        echo "🔗 Workflow: ${{ secrets.DATABRICKS_DEST_HOST }}/jobs/${{ env.WORKFLOW_JOB_ID }}"